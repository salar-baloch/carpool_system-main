<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
  <title id="title">CarPool App UI Preview</title>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#eef2ff" />
    </linearGradient>
  </defs>
  <rect width="1200" height="700" rx="12" fill="url(#bg)" stroke="#e6e9ef" />

  <!-- Header -->
  <rect x="24" y="20" width="1152" height="64" rx="8" fill="#1f2937" />
  <text x="48" y="60" fill="#fff" font-family="Segoe UI, Roboto, Arial" font-size="20" font-weight="700">CarPool</text>
  <rect x="980" y="30" width="160" height="40" rx="6" fill="#2563eb" />
  <text x="1008" y="58" fill="#fff" font-family="Segoe UI, Roboto, Arial" font-size="14">Sign in</text>

  <!-- Left column: search + cards -->
  <rect x="24" y="100" width="420" height="560" rx="10" fill="#fff" stroke="#e6e9ef" />

  <!-- Search box -->
  <rect x="44" y="122" width="376" height="52" rx="8" fill="#f1f5f9" />
  <text x="60" y="154" fill="#94a3b8" font-family="Segoe UI, Roboto, Arial" font-size="14">From • To • Date</text>

  <!-- Cards -->
  <g fill="#fff" stroke="#e6e9ef">
    <rect x="44" y="190" width="376" height="110" rx="8" />
    <rect x="44" y="314" width="376" height="110" rx="8" />
    <rect x="44" y="438" width="376" height="110" rx="8" />
  </g>
  <text x="64" y="220" fill="#0f172a" font-family="Segoe UI, Roboto, Arial" font-size="16" font-weight="600">Trip: Downtown → Airport</text>
  <text x="64" y="244" fill="#475569" font-family="Segoe UI, Roboto, Arial" font-size="13">Depart: 2026-05-10 • Seats: 3 • PKR 400</text>

  <!-- Right column: map placeholder -->
  <rect x="464" y="100" width="700" height="560" rx="10" fill="#e6eefc" stroke="#dbeafe" />
  <text x="880" y="140" fill="#0f172a" font-family="Segoe UI, Roboto, Arial" font-size="14" font-weight="600">Map (OpenStreetMap / Leaflet)</text>

  <!-- Map markers -->
  <g fill="#ef4444" stroke="#fff" stroke-width="2">
    <circle cx="760" cy="260" r="12" />
    <circle cx="980" cy="360" r="12" />
  </g>

  <!-- Footer / badges -->
  <rect x="24" y="674" width="1152" height="8" rx="4" fill="#e6e9ef" />

  <!-- Small UI accents -->
  <rect x="980" y="110" width="160" height="34" rx="6" fill="#10b981" />
  <text x="1004" y="133" fill="#fff" font-family="Segoe UI, Roboto, Arial" font-size="12">Share a ride</text>

  <text x="48" y="690" fill="#94a3b8" font-family="Segoe UI, Roboto, Arial" font-size="12">Preview: simplified mock of most recent UI</text>
</svg>
